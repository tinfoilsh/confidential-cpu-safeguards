cvm-version: 0.10.4
cpus: 32
memory: 65536
gpus: 0

models:
  - name: "gliguard"
    repo: "fastino/gliguard-LLMGuardrails-300M@4c03acfe6fcef7bb806d0ae721742d593ddba387"
    mpk: "976526c1bd94e64d154f0dfb03e5ec303f2f1fe801f4e2e5a9d0aad8ca14cca6_842289152_3188f523-66ef-5788-8173-412ada5cdd33"

containers:
  - name: "cpu-safeguards"
    image: "ghcr.io/tinfoilsh/confidential-cpu-safeguards@sha256:40e88a82d69d0a87a07181462ced2d68d508a0e0ce5812b41985d59b9ed4908f" # v0.0.10
    restart: always
    env:
      - GLIGUARD_MODEL_PATH: "/tinfoil/mpk/mpk-976526c1bd94e64d154f0dfb03e5ec303f2f1fe801f4e2e5a9d0aad8ca14cca6"
      - NUM_THREADS: "4"
      - MAX_CONCURRENCY: "16"
    tmpfs:
      /tmp: size=512m,mode=1777,exec
      /root: size=2g,mode=0700,exec
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8001"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10m

shim:
  upstream-port: 8001
  authenticated: false
  paths:
    - /classify
    - /classify-all
    - /health
    - /models
